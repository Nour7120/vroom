spring.application.name=vroom

# ============================================================
# SERVER
# ============================================================
server.port=${SERVER_PORT}

# ============================================================
# DATASOURCE ? PostgreSQL
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# LIQUIBASE
# ============================================================
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true
spring.liquibase.default-schema=${LIQUIBASE_SCHEMA}
spring.liquibase.drop-first=false

# ============================================================
# CORS
# ============================================================
# Comma-separated list of allowed origins. Use * for all (dev only).
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
# Comma-separated list of allowed HTTP methods.
cors.allowed-methods=${CORS_ALLOWED_METHODS}
# Allowed request headers (* = all).
cors.allowed-headers=${CORS_ALLOWED_HEADERS}
# Headers exposed to the browser.
cors.exposed-headers=${CORS_EXPOSED_HEADERS}
# Pre-flight cache duration in seconds.
cors.max-age=${CORS_MAX_AGE}

# ============================================================
# SECURITY - Keycloak as OAuth2 Resource Server (JWT)
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI}

# ============================================================
# KEYCLOAK ADMIN CLIENT
# ============================================================
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET}
# Master realm credentials used to obtain admin tokens
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}

# ============================================================
# REGISTRATION
# ============================================================
# Minimum minutes a user must wait between resend-verification-email requests
registration.verification.resend-interval-minutes=${REGISTRATION_VERIFICATION_RESEND_INTERVAL_MINUTES}
# Maximum resend attempts allowed per calendar day per email
registration.verification.daily-max-retries=${REGISTRATION_VERIFICATION_DAILY_MAX_RETRIES}

# ============================================================
# AUTH (password lifecycle)
# ============================================================
# Minimum minutes a user must wait between consecutive forgot-password email requests
auth.password-reset.resend-interval-minutes=${AUTH_PASSWORD_RESET_RESEND_INTERVAL_MINUTES}
# Maximum forgot-password email attempts allowed per calendar day per email
auth.password-reset.daily-max-retries=${AUTH_PASSWORD_RESET_DAILY_MAX_RETRIES}

# ============================================================
# SWAGGER / SPRINGDOC
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false
springdoc.override-with-generic-response=false
# Base URL shown in Swagger UI and used for "Try it out".
# Locally this defaults to http://localhost:<SERVER_PORT>.
# In production set env var: SWAGGER_SERVER_URL=https://api.yourdomain.com
app.swagger.server-url=${SWAGGER_SERVER_URL:http://localhost:${server.port}}

# ============================================================
# SPRING BOOT ADMIN (client disabled ? server mode)
# ============================================================
spring.boot.admin.server.enabled=true

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# ============================================================
# LOGGING
# ============================================================
logging.level.com.county_cars.vroom=DEBUG
logging.level.org.springframework.security=INFO
logging.level.liquibase=INFO


# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.check-template-location=false

# ============================================================
# MULTIPART ? raise limits to cover max document size (25 MB)
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=26MB
spring.servlet.multipart.max-request-size=27MB

# ============================================================
# ATTACHMENT MODULE
# ============================================================
# Storage backend selector ? no Spring profile needed.
# Values: local | s3
attachment.storage.provider=${ATTACHMENT_STORAGE_PROVIDER}

# Local storage ? root upload directory (relative to working dir)
attachment.local.upload-dir=${ATTACHMENT_LOCAL_UPLOAD_DIR}

# ?? File size limits (bytes) ??????????????????????????????????
attachment.max-image-size-bytes=${ATTACHMENT_MAX_IMAGE_SIZE_BYTES}
attachment.max-document-size-bytes=${ATTACHMENT_MAX_DOCUMENT_SIZE_BYTES}

# ?? Categories treated as "image" for the size-limit check ???
# Must match AttachmentCategory enum values exactly
attachment.image-categories=${ATTACHMENT_IMAGE_CATEGORIES}

# ?? Allowed file extensions (lower-cased, no dot) ????????????
attachment.allowed-extensions=${ATTACHMENT_ALLOWED_EXTENSIONS}

# ?? Allowed MIME types (Apache Tika magic-number detection) ??
attachment.allowed-mime-types=${ATTACHMENT_ALLOWED_MIME_TYPES}

# S3 ? only used when attachment.storage.provider=s3
attachment.s3.bucket-name=${ATTACHMENT_S3_BUCKET_NAME}
attachment.s3.region=${ATTACHMENT_S3_REGION}

# ============================================================
# CHAT / WEBSOCKET
# ============================================================
# Heartbeat interval in seconds
chat.websocket.heartbeat-interval-seconds=${CHAT_HEARTBEAT_INTERVAL_SECONDS:30}
# Session considered dead after this many missed heartbeats
chat.websocket.max-missed-heartbeats=${CHAT_MAX_MISSED_HEARTBEATS:2}
# Max message content size in bytes (default 5 KB)
chat.message.max-size-bytes=${CHAT_MESSAGE_MAX_SIZE_BYTES:5120}
# Rate limit: max messages per second per user
chat.rate-limit.messages-per-second=${CHAT_RATE_LIMIT_MESSAGES_PER_SECOND:10}

