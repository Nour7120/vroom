spring.application.name=vroom

# ============================================================
# SERVER
# ============================================================
server.port=8082

# ============================================================
# DATASOURCE ? PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/vroom?currentSchema=dev
spring.datasource.username=keycloak
spring.datasource.password=keycloak
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# LIQUIBASE
# ============================================================
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true
spring.liquibase.default-schema=dev
spring.liquibase.drop-first=false

# ============================================================
# CORS
# ============================================================
# Comma-separated list of allowed origins. Use * for all (dev only).
cors.allowed-origins=*
# Comma-separated list of allowed HTTP methods.
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
# Allowed request headers (* = all).
cors.allowed-headers=*
# Headers exposed to the browser.
cors.exposed-headers=Authorization,Content-Disposition
# Pre-flight cache duration in seconds.
cors.max-age=3600

# ============================================================
# SECURITY - Keycloak as OAuth2 Resource Server (JWT)
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/vroom
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8090/realms/vroom/protocol/openid-connect/certs

# ============================================================
# KEYCLOAK ADMIN CLIENT
# ============================================================
keycloak.admin.server-url=http://localhost:8090
keycloak.admin.realm=vroom
keycloak.admin.client-id=vroom-backend
keycloak.admin.client-secret=YEIoZMDf0qTEkaMaCEQNMw3puz1WGW5X
# Master realm credentials used to obtain admin tokens
keycloak.admin.username=superadmin
keycloak.admin.password=admin

# ============================================================
# REGISTRATION
# ============================================================
# Minimum minutes a user must wait between resend-verification-email requests
registration.verification.resend-interval-minutes=2
# Maximum resend attempts allowed per calendar day per email
registration.verification.daily-max-retries=5

# ============================================================
# AUTH (password lifecycle)
# ============================================================
# Minimum minutes a user must wait between consecutive forgot-password email requests
auth.password-reset.resend-interval-minutes=2
# Maximum forgot-password email attempts allowed per calendar day per email
auth.password-reset.daily-max-retries=5

# ============================================================
# SWAGGER / SPRINGDOC
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false
springdoc.override-with-generic-response=false

# ============================================================
# SPRING BOOT ADMIN (client disabled ? server mode)
# ============================================================
spring.boot.admin.server.enabled=true

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# ============================================================
# LOGGING
# ============================================================
logging.level.com.county_cars.vroom=DEBUG
logging.level.org.springframework.security=INFO
logging.level.liquibase=INFO


# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.check-template-location=false

# ============================================================
# MULTIPART ? raise limits to cover max document size (25 MB)
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=26MB
spring.servlet.multipart.max-request-size=27MB

# ============================================================
# ATTACHMENT MODULE
# ============================================================
# Storage backend selector ? no Spring profile needed.
# Values: local | s3
attachment.storage.provider=local

# Local storage ? root upload directory (relative to working dir)
attachment.local.upload-dir=uploads

# ?? File size limits (bytes) ??????????????????????????????????
attachment.max-image-size-bytes=10485760
attachment.max-document-size-bytes=26214400

# ?? Categories treated as "image" for the size-limit check ???
# Must match AttachmentCategory enum values exactly
attachment.image-categories=PROFILE_PHOTO,VEHICLE_IMAGE

# ?? Allowed file extensions (lower-cased, no dot) ????????????
attachment.allowed-extensions=jpg,jpeg,png,gif,webp,pdf,doc,docx,xls,xlsx,mp4,mov,avi

# ?? Allowed MIME types (Apache Tika magic-number detection) ??
attachment.allowed-mime-types=\
  image/jpeg,\
  image/png,\
  image/gif,\
  image/webp,\
  application/pdf,\
  application/msword,\
  application/vnd.openxmlformats-officedocument.wordprocessingml.document,\
  application/vnd.ms-excel,\
  application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,\
  video/mp4,\
  video/quicktime,\
  video/x-msvideo

# S3 ? only used when attachment.storage.provider=s3
attachment.s3.bucket-name=vroom-attachments
attachment.s3.region=eu-west-1
