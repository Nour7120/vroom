name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: vroom-backend

    steps:

      # 1️⃣ Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4


      # 2️⃣ Setup Java
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven


      # 3️⃣ Extract Version
      - name: Extract Project Version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV


      # 4️⃣ Build Jar
      - name: Build Application Jar
        run: mvn clean package -DskipTests


      # 5️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      # 6️⃣ Build Docker Image
      - name: Build Docker Image (Spring Boot Buildpacks)
        run: |
          mvn spring-boot:build-image -DskipTests \
          -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}


      # 7️⃣ Tag Latest
      - name: Tag Latest Image
        run: |
          docker tag \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION} \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest


      # 8️⃣ Push Images
      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
