name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Extract project version
        id: project_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image using Spring Boot
        run: |
          mvn spring-boot:build-image \
          -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USERNAME }}/vroom-backend:${VERSION}

      - name: Tag latest image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/vroom-backend:${VERSION} \
          ${{ secrets.DOCKER_USERNAME }}/vroom-backend:latest

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/vroom-backend:${VERSION}
          docker push ${{ secrets.DOCKER_USERNAME }}/vroom-backend:latest
